name: expert-network
channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python ───────────────────────────────────────────────────────────────
  - python=3.11

  # ── System-level (conda manages these better than pip) ───────────────────
  - postgresql                  # psql client for debugging
  - pip

  # ── Everything else via pip ───────────────────────────────────────────────
  - pip:
      # FastAPI stack
      - fastapi>=0.115.0
      - uvicorn[standard]>=0.30.0
      - python-multipart>=0.0.9
      - pydantic>=2.8.0
      - pydantic-settings>=2.4.0

      # LangGraph / LangChain (Text-to-SQL agent)
      - langgraph>=0.2.0
      - langchain>=0.3.0
      - langchain-core>=0.3.0
      - langchain-openai>=0.2.0
      - langchain-community>=0.3.0

      # Database
      - psycopg2-binary>=2.9.9
      - sqlalchemy>=2.0.0

      # Pinecone
      - pinecone>=5.0.0

      # Embeddings (OpenAI-compatible client)
      - openai>=1.40.0

      # Utilities
      - python-dotenv>=1.0.0

      # Testing
      - pytest>=8.0.0
      - pytest-asyncio>=0.23.0
      - httpx>=0.27.0           # async test client for FastAPI
